<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NNTI 南梁(男娘)人格测试</title>
  <style>
    :root {
      /* 将猫鼠的芝士黄改为更符合主题的樱花粉/浅紫色调 */
      --bg: #fef8fa;
      --panel: #ffffff;
      --text: #3a2a32;
      --muted: #8b7a82;
      --line: #f2e1e8;
      --soft: #fcf1f5;
      --accent: #f48fb1;
      --accent-strong: #d81b60;
      --shadow: 0 16px 40px rgba(216, 27, 96, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #fffcfd 0, #fef8fa 36%, #fdf0f4 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(244, 143, 177, 0.18), rgba(244, 143, 177, 0.02));
      pointer-events: none;
    }

    h1, h2, h3, p { margin: 0; }
    .hero h1 {
      font-size: clamp(28px, 5vw, 52px);
      line-height: 1.08;
      letter-spacing: -0.03em;
      max-width: 680px;
    }

    .hero-minimal {
      min-height: 48vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 42px 20px;
    }
    .hero-minimal h1 { max-width: none; margin: 0; }
    .hero-actions-single { justify-content: center; margin-top: 28px; }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      font: inherit;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(216, 27, 96, 0.18);
      font-weight: 700;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-weight: 700;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .test-wrap, .result-wrap { margin-top: 22px; padding: 22px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .progress {
      flex: 1;
      min-width: 240px;
      height: 10px;
      background: #f8eff2;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #f48fb1, #d81b60);
      border-radius: inherit;
      transition: width .22s ease;
    }

    .progress-text { color: var(--muted); font-size: 13px; white-space: nowrap; }

    .question-list { display: grid; gap: 16px; }
    .question {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fffcfd);
    }
    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--soft);
      border: 1px solid var(--line);
    }
    .question-title { font-size: 16px; line-height: 1.7; white-space: pre-wrap; font-weight: 600;}
    .options { display: grid; gap: 10px; margin-top: 14px; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }
    .option:hover { border-color: #f0cdda; background: #fffafc; cursor: pointer; }
    .option input { margin-top: 3px; accent-color: var(--accent-strong); transform: scale(1.1); flex-shrink: 0; }
    .option-code { font-weight: 800; color: var(--accent-strong); min-width: 22px; }

    .actions-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 6px;
    }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.7; }

    .result-layout { display: grid; gap: 18px; }
    .result-top {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: stretch;
    }
    .poster-box, .type-box, .analysis-box, .dim-box, .note-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fffcfd);
    }
    
    .poster-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      background: radial-gradient(circle at center, rgba(244,143,177,0.15), rgba(244,143,177,0) 60%), linear-gradient(180deg, #ffffff, #fdfafb);
      text-align: center;
    }
    .poster-emoji {
      font-size: 80px;
      margin-bottom: 20px;
      filter: drop-shadow(0 10px 15px rgba(216, 27, 96, 0.2));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .poster-caption { font-size: 16px; font-weight: bold; color: var(--accent-strong); }

    .type-kicker { font-size: 12px; color: var(--accent-strong); margin-bottom: 8px; letter-spacing: .06em; }
    .type-name { font-size: clamp(30px, 5vw, 48px); line-height: 1.08; letter-spacing: -0.03em; font-weight: 800;}
    .type-subname { margin-top: 10px; color: var(--muted); font-size: 14px; line-height: 1.8; }
    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 14px;
    }
    .analysis-box h3, .dim-box h3, .note-box h3 { font-size: 16px; margin-bottom: 12px; }
    .analysis-box p { margin: 0; color: #403430; font-size: 15px; line-height: 1.9; white-space: pre-wrap; }
    
    .dim-list { display: grid; gap: 12px; }
    .dim-item { border: 1px solid var(--line); border-radius: 16px; padding: 14px; background: #fff; }
    .dim-item-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .dim-item-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .dim-item-score { color: var(--accent-strong); font-weight: 800; font-size: 14px; }
    .dim-item p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.8; }
    .note-box p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.8; }

    .result-actions { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 22px; }

    @media (max-width: 860px) { .result-top { grid-template-columns: 1fr; } }
    @media (max-width: 600px) {
      .shell { padding: 14px 12px 42px; }
      .hero, .test-wrap, .result-wrap { padding: 16px; }
      .hero h1 { font-size: 32px; }
      .question-title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section id="intro" class="screen active">
      <div class="hero card hero-minimal">
        <h1>MBTI已经过时，<br>NNTI (南梁人格指标) 来了。</h1>
        <div class="hero-actions hero-actions-single">
          <button id="startBtn" class="btn-primary">开始测试我的南梁人格</button>
        </div>
        <div style="margin-top: 2rem; color: var(--muted); font-size: 14px; line-height: 1.6;">
          基于互联网ACGN次文化及贴吧真实生态编撰的硬核（胡扯）测试。<br>
          整整50道超准送命题，看看你在“男娘”生态中，究竟属于什么稀有物种。
        </div>
      </div>
    </section>

    <section id="test" class="screen">
      <div class="test-wrap card">
        <div class="topbar">
          <div class="progress"><span id="progressBar"></span></div>
          <div class="progress-text" id="progressText">0 / 51</div>
        </div>

        <div id="questionList" class="question-list"></div>

        <div class="actions-bottom">
          <div class="hint" id="testHint">诚实作答，不要自欺欺人，直面你内心的渴望吧。</div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <button id="submitBtn" class="btn-primary" disabled>提交并查看身份</button>
          </div>
        </div>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="result-wrap card">
        <div class="result-layout">
          <div class="result-top">
            <div class="poster-box" id="posterBox">
              <div id="posterEmoji" class="poster-emoji">🎀</div>
              <div id="posterCaption" class="poster-caption">测测你的隐藏属性</div>
            </div>

            <div class="type-box">
              <div class="type-kicker" id="resultModeKicker">你的NNTI主身份</div>
              <div class="type-name" id="resultTypeName">分析中...</div>
              <div class="match" id="matchBadge">匹配度 100%</div>
              <div class="type-subname" id="resultTypeSub">系统备注会显示在这里。</div>
            </div>
          </div>

          <div class="analysis-box">
            <h3>人格深度解析</h3>
            <p id="resultDesc"></p>
          </div>

          <div class="dim-box">
            <h3>NNTI 十五维度雷达</h3>
            <div id="dimList" class="dim-list"></div>
          </div>

          <div class="note-box">
            <h3>测试者须知</h3>
            <p id="funNote">本测试仅供娱乐与次文化研究。不论你是硬核大佬还是云端看客，穿衣自由，开心最重要。接纳真实的自己，每一面都很美。</p>
          </div>
        </div>

        <div class="result-actions">
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="restartBtn" class="btn-secondary">再测一次</button>
            <button id="toTopBtn" class="btn-primary">回到首页</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // 维度重定义：南梁15维度
    const dimensionMeta = {
      S1: { name: 'S1 自我认知清晰度 (Identity)' },
      S2: { name: 'S2 心理防御与接纳度 (Defense)' },
      S3: { name: 'S3 审美执念度 (Aesthetic)' },
      E1: { name: 'E1 现实隐蔽度 (Camouflage)' },
      E2: { name: 'E2 穿搭跨界偏好 (Outfit)' },
      E3: { name: 'E3 细节打理与护肤 (Grooming)' },
      A1: { name: 'A1 二次元/冲浪纯度 (ACG Purity)' },
      A2: { name: 'A2 萌物感知力 (Cuteness)' },
      A3: { name: 'A3 脑洞与幻想程度 (Fantasy)' },
      Ac1: { name: 'Ac1 实践行动力 (Action)' },
      Ac2: { name: 'Ac2 伪装/化妆熟练度 (Skill)' },
      Ac3: { name: 'Ac3 氪金/消费意愿 (Spending)' },
      So1: { name: 'So1 社交渴望度 (Social Desire)' },
      So2: { name: 'So2 情感依赖度 (Emotional)' },
      So3: { name: 'So3 圈内活跃度 (Community)' }
    };

    // 50道题目
    const questions = [
      // S1: 自我认知 (3)
      { id: 'q1', dim: 'S1', text: '当你照镜子时，你脑海中最常闪过的念头是？', options: [ { label: '如果能变得更可爱/更像女孩子就好了。', value: 3 }, { label: '感觉自己的气质介于两者之间，挺好。', value: 2 }, { label: '我是个纯爷们，这没什么好质疑的。', value: 1 } ] },
      { id: 'q2', dim: 'S1', text: '如果在网上被人错认成“小姐姐”，你的反应是？', options: [ { label: '狂喜，截图发群炫耀。', value: 3 }, { label: '不主动澄清，将错就错也挺有意思。', value: 2 }, { label: '立刻解释自己是男的。', value: 1 } ] },
      { id: 'q3', dim: 'S1', text: '对于“男娘”这个词汇，你觉得在自己身上适用的程度是？', options: [ { label: '完美契合，这就是我！', value: 3 }, { label: '在某些特定时刻或装扮下适用。', value: 2 }, { label: '和我毫无关系，我只是路过看热闹的。', value: 1 } ] },
      
      // S2: 心理防御 (3)
      { id: 'q4', dim: 'S2', text: '如果突然被现实中的普通朋友发现了你的“特殊女装癖好”，你会？', options: [ { label: '无所谓，甚至当场给他安利哪家裙子好看。', value: 3 }, { label: '有点尴尬，但会试图用“玩梗”、“打赌输了”蒙混过去。', value: 2 }, { label: '社会性死亡，连夜扛着火车逃离这座城市。', value: 1 } ] },
      { id: 'q5', dim: 'S2', text: '刚买完一套非常漂亮但也非常羞耻的衣服，快递到了，你的心情是？', options: [ { label: '迫不及待想穿上拍照！', value: 3 }, { label: '期待又忐忑，锁好房门拉上窗帘才敢拆。', value: 2 }, { label: '冲动消费后的无尽懊悔，甚至想直接退货（贤者时间）。', value: 1 } ] },
      { id: 'q6', dim: 'S2', text: '面对网上对这个群体的恶评或不理解，你的心态是？', options: [ { label: '内心毫无波澜，甚至觉得他们不懂审美。', value: 3 }, { label: '稍微有点在意，但会自我消化。', value: 2 }, { label: '极度害怕被骂，因此绝不敢公开自己的任何相关信息。', value: 1 } ] },

      // S3: 审美执念 (3)
      { id: 'q7', dim: 'S3', text: '你对自己体型/骨架的在意程度有多高？', options: [ { label: '极度在意，经常因为肩宽/腿粗/身高而陷入容貌焦虑。', value: 3 }, { label: '有意识地在控制饮食或锻炼，希望能瘦一点。', value: 2 }, { label: '顺其自然，健康最重要，胖点瘦点无所谓。', value: 1 } ] },
      { id: 'q8', dim: 'S3', text: '如果要发一张自拍，你的修图流程是？', options: [ { label: '瘦脸大眼磨皮美白加滤镜，甚至动用液化重塑骨相，不搞个半小时绝不发。', value: 3 }, { label: '套个滤镜，稍微修一下明显的瑕疵。', value: 2 }, { label: '原相机直出，或者根本不爱自拍。', value: 1 } ] },
      { id: 'q9', dim: 'S3', text: '关于全身的穿搭协调性，你的要求是？', options: [ { label: '从发卡、美瞳、项链到袜子颜色，必须100%完美搭配。', value: 3 }, { label: '大体上风格一致，不出错就行。', value: 2 }, { label: '随便穿，能套在身上遮体就行。', value: 1 } ] },

      // E1: 现实伪装 (3)
      { id: 'q10', dim: 'E1', text: '在现实生活中，你的衣柜构成是？', options: [ { label: '清一色的男装，哪怕有女装也藏在最底层带锁的箱子里。', value: 3 }, { label: '有很多中性风、oversize的衣服，男女莫辨。', value: 2 }, { label: '大方挂着裙子和女装，家人/室友都已经见怪不怪了。', value: 1 } ] },
      { id: 'q11', dim: 'E1', text: '平时出门在外的走路姿势或坐姿，你会？', options: [ { label: '刻意保持传统的“男性粗犷”做派，生怕被人看出端倪。', value: 3 }, { label: '随性自然，怎么舒服怎么来。', value: 2 }, { label: '不自觉地会有一些内八、并腿坐等比较柔软的习惯。', value: 1 } ] },
      { id: 'q12', dim: 'E1', text: '你点外卖或者收快递时留的名字/称呼通常是？', options: [ { label: '纯粹的本名或先生。', value: 3 }, { label: '中性的昵称，让人看不出性别。', value: 2 }, { label: 'X女士/小姐姐/可爱的小名。', value: 1 } ] },

      // E2: 穿搭偏好 (4)
      { id: 'q13', dim: 'E2', text: '如果你可以毫无顾忌地选一套衣服出门，你会选？', options: [ { label: '全套的Lolita/JK制服/华丽Cos服！', value: 3 }, { label: '偏中性偏可爱的日系软妹服或地雷系。', value: 2 }, { label: '普通的T恤牛仔裤就挺好。', value: 1 } ] },
      { id: 'q14', dim: 'E2', text: '你的睡衣通常是什么风格？', options: [ { label: '毛茸茸的动物连体衣、蕾丝吊带或带有可爱印花的长裙。', value: 3 }, { label: '简单的纯色棉质睡衣套装。', value: 2 }, { label: '大背心大裤衩，或者干脆裸睡。', value: 1 } ] },
      { id: 'q15', dim: 'E2', text: '对于“绝对领域”（过膝袜与短裙之间的缝隙），你的态度是？', options: [ { label: '真理！最伟大的发明！必须拥有！', value: 3 }, { label: '挺好看的，欣赏一下。', value: 2 }, { label: '无感，冬天穿这不冷吗？', value: 1 } ] },
      { id: 'q16', dim: 'E2', text: '在配饰方面，你最有可能购买的是？', options: [ { label: 'Choker（颈圈）、猫耳发箍、腿环等。', value: 3 }, { label: '简约的手表、简单的手链。', value: 2 }, { label: '什么配饰都不戴，嫌麻烦。', value: 1 } ] },

      // E3: 细节打理 (4)
      { id: 'q17', dim: 'E3', text: '你的日常护肤步骤有多繁琐？', options: [ { label: '水、精华、乳液、面霜、眼霜、防晒一个不落，定期做面膜。', value: 3 }, { label: '洗面奶洗完涂个大宝或水乳。', value: 2 }, { label: '清水洗脸，全靠基因硬抗。', value: 1 } ] },
      { id: 'q18', dim: 'E3', text: '对待体毛（腿毛/腋毛等），你的处理方式是？', options: [ { label: '绝不容忍任何一根杂毛！脱毛膏、刮毛刀甚至激光脱毛全安排上。', value: 3 }, { label: '偶尔想穿裙子/短裤时会处理一下。', value: 2 }, { label: '身体发肤受之父母，茂盛点才够男人！', value: 1 } ] },
      { id: 'q19', dim: 'E3', text: '你的手部和指甲护理情况？', options: [ { label: '经常涂护手霜，甚至会做美甲、涂透明指甲油。', value: 3 }, { label: '保持干净整洁，定期剪指甲。', value: 2 }, { label: '指甲缝里有灰，死皮倒刺是常态。', value: 1 } ] },

          levels[dim] = sumToLevel(score, dimCounts[dim]); 
      });

      const userVector = dimensionOrder.map(dim => levelNum(levels[dim]));
      const ranked = NORMAL_TYPES.map(type => {
        const vector = parsePattern(type.pattern).map(levelNum);
        let distance = 0, exact = 0;
        for (let i = 0; i < vector.length; i++) {
          const diff = Math.abs(userVector[i] - vector[i]);
          distance += diff;
          if (diff === 0) exact += 1;
        }
        const similarity = Math.max(0, Math.round((1 - distance / 30) * 100));
        return { ...type, ...TYPE_LIBRARY[type.code], distance, exact, similarity };
      }).sort((a, b) => {
        if (a.distance !== b.distance) return a.distance - b.distance;
        if (b.exact !== a.exact) return b.exact - a.exact;
        return b.similarity - a.similarity;
      });

      const bestNormal = ranked[0];
      const isLagTriggered = app.answers['lag_gate_q2'] === 2;

      let finalType, modeKicker = '你的隐藏副面', badge = `相似度 ${bestNormal.similarity}%`, sub = '大数据已成功解析你最真实的心理图谱。';
      
      if (isLagTriggered) {
        finalType = TYPE_LIBRARY.DRUNK; // Mapping DRUNK to Lag/Death Survivor
        modeKicker = '特殊隐藏结局触发';
        badge = '匹配度 100% · 社死基因完全觉醒';
        sub = '由于你经历了毁天灭地的社死事件，常规人格防线已全面崩溃。';
      } else if (bestNormal.similarity < 60) {
        finalType = TYPE_LIBRARY.HHHH;
        modeKicker = '异常人格收容所';
        badge = `最高匹配仅 ${bestNormal.similarity}%`;
        sub = '你的脑回路过于清奇，正常人类分类学已无法定义你。';
      } else {
        finalType = bestNormal;
      }
      return { rawScores, levels, finalType, modeKicker, badge, sub };
    }

    function renderResult() {
      const result = computeResult();
      const type = result.finalType;

      document.getElementById('resultModeKicker').textContent = result.modeKicker;
      document.getElementById('resultTypeName').textContent = `${type.cn}`; // 只显示中文名
      document.getElementById('matchBadge').textContent = result.badge;
      document.getElementById('resultTypeSub').textContent = result.sub;
      document.getElementById('resultDesc').textContent = type.desc;
      document.getElementById('posterCaption').textContent = type.intro;
      document.getElementById('posterEmoji').textContent = type.emoji || "✨";

      const dimList = document.getElementById('dimList');
      dimList.innerHTML = dimensionOrder.map(dim => {
        const level = result.levels[dim];
        return `
          <div class="dim-item">
            <div class="dim-item-top">
              <div class="dim-item-name">${dimensionMeta[dim].name}</div>
              <div class="dim-item-score">${level} 级特征</div>
            </div>
            <p>${DIM_EXPLANATIONS[dim][level]}</p>
          </div>
        `;
      }).join('');
      showScreen('result');
    }

    function startTest() {
      app.answers = {};
      const shuffledRegular = shuffle(questions);
      const insertIndex = Math.floor(Math.random() * (shuffledRegular.length - 10)) + 5; // 随机插入特殊问题
      app.shuffledQuestions = [
        ...shuffledRegular.slice(0, insertIndex),
        specialQuestions[0],
        ...shuffledRegular.slice(insertIndex)
      ];
      renderQuestions();
      showScreen('test');
    }

    document.getElementById('startBtn').addEventListener('click', startTest);
    document.getElementById('backIntroBtn').addEventListener('click', () => showScreen('intro'));
    document.getElementById('submitBtn').addEventListener('click', renderResult);
    document.getElementById('restartBtn').addEventListener('click', startTest);
    document.getElementById('toTopBtn').addEventListener('click', () => showScreen('intro'));
  </script>
</body>
</html>
