<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLTI 萌系属性羁绊测试</title>
  <style>
    :root {
      --bg: #fff5f7;
      --panel: #ffffff;
      --text: #3a2e32;
      --muted: #8a7a80;
      --line: #fce3e9;
      --soft: #fcf0f3;
      --accent: #ff85a2;
      --accent-strong: #ff4d79;
      --shadow: 0 16px 40px rgba(255, 77, 121, 0.08);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #fffbfb 0, #fff5f7 36%, #fcedf0 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -60px;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(255, 133, 162, 0.15), rgba(255, 133, 162, 0.02));
      pointer-events: none;
    }

    h1, h2, h3, p { margin: 0; }
    .hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.15;
      letter-spacing: -0.03em;
      max-width: 680px;
      color: var(--accent-strong);
    }

    .hero-minimal {
      min-height: 48vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 42px 20px;
    }
    .hero-minimal h1 { max-width: none; margin: 0; }
    .hero-actions-single { justify-content: center; margin-top: 28px; }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      font: inherit;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 20px;
      border-radius: 14px;
      box-shadow: 0 12px 30px rgba(255, 77, 121, 0.2);
      font-weight: 700;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 20px;
      border-radius: 14px;
      border: 1px solid var(--accent);
      font-weight: 700;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .test-wrap, .result-wrap { margin-top: 22px; padding: 22px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .progress {
      flex: 1;
      min-width: 240px;
      height: 10px;
      background: #fcedf0;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #ff85a2, #ff4d79);
      border-radius: inherit;
      transition: width .22s ease;
    }

    .progress-text { color: var(--muted); font-size: 13px; white-space: nowrap; }

    .question-list { display: grid; gap: 16px; }
    .question {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fffcfd);
    }
    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--soft);
      border: 1px solid var(--line);
    }
    .question-title { font-size: 16px; line-height: 1.7; white-space: pre-wrap; font-weight: 600;}
    .options { display: grid; gap: 10px; margin-top: 14px; }
    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }
    .option:hover { border-color: var(--accent); background: #fffcfd; cursor: pointer; }
    .option input { margin-top: 3px; accent-color: var(--accent-strong); transform: scale(1.1); flex-shrink: 0; }
    .option-code { font-weight: 800; color: var(--accent-strong); min-width: 22px; }

    .actions-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
      padding-top: 6px;
    }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.7; }

    .result-layout { display: grid; gap: 18px; }
    .result-top {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 18px;
      align-items: stretch;
    }
    .poster-box, .type-box, .analysis-box, .dim-box, .note-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff, #fffcfd);
    }
    
    .poster-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      background: radial-gradient(circle at center, rgba(255,133,162,0.15), rgba(255,133,162,0) 60%), linear-gradient(180deg, #ffffff, #fcfafb);
      text-align: center;
    }
    .poster-emoji {
      font-size: 80px;
      margin-bottom: 20px;
      filter: drop-shadow(0 10px 15px rgba(255, 77, 121, 0.2));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .poster-caption { font-size: 16px; font-weight: bold; color: var(--accent-strong); }

    .type-kicker { font-size: 12px; color: var(--accent-strong); margin-bottom: 8px; letter-spacing: .06em; }
    .type-name { font-size: clamp(28px, 5vw, 44px); line-height: 1.08; letter-spacing: -0.03em; font-weight: 800;}
    .type-subname { margin-top: 10px; color: var(--muted); font-size: 14px; line-height: 1.8; }
    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 14px;
    }
    .analysis-box h3, .dim-box h3, .note-box h3 { font-size: 16px; margin-bottom: 12px; }
    .analysis-box p { margin: 0; color: #403430; font-size: 15px; line-height: 1.9; white-space: pre-wrap; }
    
    .dim-list { display: grid; gap: 12px; }
    .dim-item { border: 1px solid var(--line); border-radius: 16px; padding: 14px; background: #fff; }
    .dim-item-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .dim-item-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .dim-item-score { color: var(--accent-strong); font-weight: 800; font-size: 14px; }
    .dim-item p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.8; }
    .note-box p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.8; }

    .result-actions { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 22px; }

    @media (max-width: 860px) { .result-top { grid-template-columns: 1fr; } }
    @media (max-width: 600px) {
      .shell { padding: 14px 12px 42px; }
      .hero, .test-wrap, .result-wrap { padding: 16px; }
      .hero h1 { font-size: 32px; }
      .question-title { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section id="intro" class="screen active">
      <div class="hero card hero-minimal">
        <h1>LLTI <br> 二次元萌系羁绊测试</h1>
        <div class="hero-actions hero-actions-single">
          <button id="startBtn" class="btn-primary">启动核心系统 (Link Start!)</button>
        </div>
        <div style="margin-top: 2rem; color: var(--muted); font-size: 14px; line-height: 1.6;">
          在浩瀚的二次元宇宙中，命中注定与你相遇的那个“她”，究竟是什么属性？<br>
          本测试包含 40 道灵魂拷问，将精准定位你的 xp (划掉) 萌系偏好雷达。
        </div>
      </div>
    </section>

    <section id="test" class="screen">
      <div class="test-wrap card">
        <div class="topbar">
          <div class="progress"><span id="progressBar"></span></div>
          <div class="progress-text" id="progressText">0 / 41</div>
        </div>

        <div id="questionList" class="question-list"></div>

        <div class="actions-bottom">
          <div class="hint" id="testHint">诚实作答，不要掩饰你内心的真实想法。</div>
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="backIntroBtn" class="btn-secondary">返回首页</button>
            <button id="submitBtn" class="btn-primary" disabled>查看我的羁绊对象</button>
          </div>
        </div>
      </div>
    </section>

    <section id="result" class="screen">
      <div class="result-wrap card">
        <div class="result-layout">
          <div class="result-top">
            <div class="poster-box" id="posterBox">
              <div id="posterEmoji" class="poster-emoji">✨</div>
              <div id="posterCaption" class="poster-caption">...加载中...</div>
            </div>

            <div class="type-box">
              <div class="type-kicker" id="resultModeKicker">你的命中注定之魂</div>
              <div class="type-name" id="resultTypeName">分析中...</div>
              <div class="match" id="matchBadge">匹配度 0%</div>
              <div class="type-subname" id="resultTypeSub"></div>
            </div>
          </div>

          <div class="analysis-box">
            <h3>羁绊档案解析</h3>
            <p id="resultDesc"></p>
          </div>

          <div class="dim-box">
            <h3>核心XP十维度雷达图</h3>
            <div id="dimList" class="dim-list"></div>
          </div>

          <div class="note-box">
            <h3>观测者日志</h3>
            <p id="funNote">二次元没有背叛，保护好那份纯真的笑容。本测试纯属娱乐，如果在现实中遇到了，请务必报警或者送她回家。</p>
          </div>
        </div>

        <div class="result-actions">
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="restartBtn" class="btn-secondary">重新洗牌命运</button>
            <button id="toTopBtn" class="btn-primary">回到首页</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    // 10 核心维度：每维度4题
    const dimensionMeta = {
      P_Tsu: { name: '坦率 vs 傲娇' },
      P_Kuu: { name: '元气 vs 三无' },
      P_Mat: { name: '稚气 vs 早熟/腹黑' },
      A_Kemo: { name: '人类 vs 异种族' },
      A_Goth: { name: '日常装 vs 华丽洋装' },
      I_Dep: { name: '独立自主 vs 极度粘人' },
      I_Dom: { name: '乖巧顺从 vs 调戏主导' },
      I_Pro: { name: '需要保护 vs 战力爆表' },
      S_Hea: { name: '沙雕搞笑 vs 治愈救赎' },
      S_Sis: { name: '天降系 vs 青梅/实妹系' }
    };

    // 40道题
    const questions = [
      // Dim 1: P_Tsu (直率 L -> 傲娇 H)
      { id: 'q1', dim: 'P_Tsu', text: '情人节那天，她递给你一块巧克力，她会怎么说？', options: [ { label: '“这是送给你的！我做了好久呢！”', value: 1 }, { label: '“平时受你照顾了，这是义理巧克力。”', value: 2 }, { label: '“才、才不是特意为你做的！只是材料买多了而已！”', value: 3 } ] },
      { id: 'q2', dim: 'P_Tsu', text: '你不小心碰到了她的手，她的反应是？', options: [ { label: '顺势握住你的手，冲你傻笑。', value: 1 }, { label: '默默地把手抽回去，脸颊微红。', value: 2 }, { label: '猛地甩开，“笨蛋！色狼！你在摸哪里啊！”', value: 3 } ] },
      { id: 'q3', dim: 'P_Tsu', text: '当她遇到解不开的数学题时？', options: [ { label: '立刻拿着本子跑来找你：“教教我嘛~”', value: 1 }, { label: '自己憋了很久，最后小声问你能不能帮她。', value: 2 }, { label: '“这种题我当然会做！只不过今天状态不好...你、你要是想讲我也不是不能听。”', value: 3 } ] },
      { id: 'q4', dim: 'P_Tsu', text: '你夸奖她今天穿的衣服很好看。', options: [ { label: '开心地转个圈：“真的吗？我也超喜欢！”', value: 1 }, { label: '小声说了句：“谢谢...”', value: 2 }, { label: '红着脸撇过头：“别盯着我看啦笨蛋！”', value: 3 } ] },

      // Dim 2: P_Kuu (元气 L -> 三无 H)
      { id: 'q5', dim: 'P_Kuu', text: '周末你们一起去游乐园，她的状态是？', options: [ { label: '拉着你到处跑，什么项目都要玩。', value: 1 }, { label: '跟在你身边，遇到感兴趣的会多看两眼。', value: 2 }, { label: '面无表情地捧着可丽饼，安静地看着你。', value: 3 } ] },
      { id: 'q6', dim: 'P_Kuu', text: '给她发搞笑视频，她的回复通常是？', options: [ { label: '“哈哈哈哈哈哈救命太好笑了！”', value: 1 }, { label: '发一个可爱的笑脸表情包。', value: 2 }, { label: '“嗯，看到了。” 或者干脆只回一个句号。', value: 3 } ] },
      { id: 'q7', dim: 'P_Kuu', text: '遇到开心的事情时，她的面部表情？', options: [ { label: '眼睛闪闪发光，笑得特别灿烂。', value: 1 }, { label: '温柔地浅笑。', value: 2 }, { label: '几乎没变化，但眼神会变得柔和，嘴角微微牵动0.1毫米。', value: 3 } ] },
      { id: 'q8', dim: 'P_Kuu', text: '房间里的背景音通常是？', options: [ { label: '她叽叽喳喳说个不停的声音或是在唱歌。', value: 1 }, { label: '偶尔的聊天声和电视声。', value: 2 }, { label: '极度安静，只能听到翻书的声音。', value: 3 } ] },

      // Dim 3: P_Mat (稚气 L -> 早熟/腹黑 H)
      { id: 'q9', dim: 'P_Mat', text: '聊起未来的梦想，她会说？', options: [ { label: '“我想当魔法少女/大明星！”', value: 1 }, { label: '“想开一家甜品店。”', value: 2 }, { label: '“这世界很无聊，我只想安静地活下去。”或者给你一个意味深长的笑。', value: 3 } ] },
      { id: 'q10', dim: 'P_Mat', text: '面对大人的无理指责，她会？', options: [ { label: '委屈地哭出来，躲到你身后。', value: 1 }, { label: '低头不说话，默默忍受。', value: 2 }, { label: '用极度冷静的逻辑或腹黑的话语把对方怼得哑口无言。', value: 3 } ] },
      { id: 'q11', dim: 'P_Mat', text: '晚上看电视，她倾向于选择？', options: [ { label: '子供向动画片或者搞笑综艺。', value: 1 }, { label: '青春偶像剧。', value: 2 }, { label: '悬疑推理剧或者深夜情感档（还会对里面的套路嗤之以鼻）。', value: 3 } ] },
      { id: 'q12', dim: 'P_Mat', text: '平时她怎么看待你？', options: [ { label: '无所不能的可靠哥哥大人！', value: 1 }, { label: '关系很好的同伴。', value: 2 }, { label: '“真是个无可救药的萝莉控笨蛋呢~”', value: 3 } ] },

      // Dim 4: A_Kemo (人类 L -> 异种族 H)
      { id: 'q13', dim: 'A_Kemo', text: '如果她身上有一处非人特征，你希望是？', options: [ { label: '不要特殊特征，普通的人类女孩子最可爱。', value: 1 }, { label: '虎牙或者尖尖的精灵耳。', value: 2 }, { label: '毛茸茸的兽耳和在背后晃来晃去的大尾巴。', value: 3 } ] },
      { id: 'q14', dim: 'A_Kemo', text: '她的日常动作习惯更偏向于？', options: [ { label: '正常的小女孩的动作。', value: 1 }, { label: '偶尔有些像小动物一样轻盈。', value: 2 }, { label: '会有猫咪洗脸、狗狗摇尾巴等明显的动物本能习性。', value: 3 } ] },
      { id: 'q15', dim: 'A_Kemo', text: '关于“摸头杀”，她的反应？', options: [ { label: '害羞或者开心。', value: 1 }, { label: '眯着眼睛享受。', value: 2 }, { label: '喉咙里会发出“呼噜呼噜”的声音。', value: 3 } ] },
      { id: 'q16', dim: 'A_Kemo', text: '她最喜欢的食物通常是？', options: [ { label: '蛋糕、冰淇淋、草莓。', value: 1 }, { label: '正常的家常菜。', value: 2 }, { label: '只吃肉，或者疯狂喜欢鱼，甚至喝血。', value: 3 } ] },

      // Dim 5: A_Goth (日常装 L -> 华丽洋装 H)
      { id: 'q17', dim: 'A_Goth', text: '约会时，她最常穿的服装是？', options: [ { label: '简单的T恤和牛仔短裤/背带裤。', value: 1 }, { label: '水手服或者JK制服。', value: 2 }, { label: '层层叠叠的哥特萝莉塔裙，带蕾丝阳伞。', value: 3 } ] },
      { id: 'q18', dim: 'A_Goth', text: '她的房间布置风格是？', options: [ { label: '温馨明亮，乱糟糟地堆着玩具和零食。', value: 1 }, { label: '整洁的日式榻榻米或者普通卧室。', value: 2 }, { label: '暗色系，充满蔷薇、十字架、古董娃娃。', value: 3 } ] },
      { id: 'q19', dim: 'A_Goth', text: '她最喜欢的配饰是？', options: [ { label: '发卡或者简单的头绳。', value: 1 }, { label: '蝴蝶结或者眼镜。', value: 2 }, { label: '眼罩、绷带、项圈或者华丽的洋装发带。', value: 3 } ] },
      { id: 'q20', dim: 'A_Goth', text: '对于“打扮”这件事，她的态度是？', options: [ { label: '嫌麻烦，能出门就行。', value: 1 }, { label: '会在意别人的目光，保持整洁。', value: 2 }, { label: '这是一种神圣的仪式，每天必须花一小时穿繁琐的衣服。', value: 3 } ] },

      // Dim 6: I_Dep (独立 L -> 粘人 H)
      { id: 'q21', dim: 'I_Dep', text: '你在打游戏或者加班时，她会？', options: [ { label: '自己去一旁看书或者玩游戏，互不打扰。', value: 1 }, { label: '给你倒杯水，然后在一旁安静看着。', value: 2 }, { label: '直接钻进你怀里，或者趴在你背上不让你专心。', value: 3 } ] },
      { id: 'q22', dim: 'I_Dep', text: '睡觉时，她更喜欢？', options: [ { label: '自己睡自己的床。', value: 1 }, { label: '害怕的时候才会来找你一起睡。', value: 2 }, { label: '必须抱着你的胳膊或者枕着你才能睡着。', value: 3 } ] },

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;

      I_Dom: { L: "听话乖巧，你是绝对的主导者。", M: "平等相处，有商有量。", H: "她是小恶魔，你是被欺负、被调戏的玩具。" },
      I_Pro: { L: "柔弱不能自理，极大地激发了你的保护欲。", M: "有自理能力，偶尔需要你帮忙。", H: "武力值天花板，你才是那个需要被包养/保护的。" },
      S_Hea: { L: "没心没肺的沙雕搞笑日常。", M: "平淡温馨的青春物语。", H: "深沉的宿命感，相互救赎的极致治愈（致郁）。" },
      S_Sis: { L: "萍水相逢，充满未知的天降系。", M: "普通的同学/邻居转变为羁绊。", H: "知根知底，血浓于水的实妹/青梅系。" }
    };

    const dimensionOrder = ['P_Tsu','P_Kuu','P_Mat','A_Kemo','A_Goth','I_Dep','I_Dom','I_Pro','S_Hea','S_Sis'];

    function computeResult() {
      const isJailTriggered = app.answers['fbi_gate'] === 3;

      const rawScores = {}; const levels = {};
      Object.keys(dimensionMeta).forEach(dim => { rawScores[dim] = 0; });
      
      questions.forEach(q => { rawScores[q.dim] += Number(app.answers[q.id] || 0); });
      Object.entries(rawScores).forEach(([dim, score]) => { levels[dim] = sumToLevel(score); });

      const userVector = dimensionOrder.map(dim => levelNum(levels[dim]));
      const ranked = NORMAL_TYPES.map(type => {
        const vector = parsePattern(type.pattern).map(levelNum);
        let distance = 0, exact = 0;
        // 10维度，最大距离 10*2 = 20
        for (let i = 0; i < vector.length; i++) {
          const diff = Math.abs(userVector[i] - vector[i]);
          distance += diff;
          if (diff === 0) exact += 1;
        }
        const similarity = Math.max(0, Math.round((1 - distance / 20) * 100));
        return { ...type, ...TYPE_LIBRARY[type.code], distance, exact, similarity };
      }).sort((a, b) => {
        if (a.distance !== b.distance) return a.distance - b.distance;
        if (b.exact !== a.exact) return b.exact - a.exact;
        return b.similarity - a.similarity;
      });

      const bestNormal = ranked[0];
      let finalType, modeKicker = '核心羁绊属性', badge = `灵魂契合度 ${bestNormal.similarity}%`, sub = '命运的红线已将你们绑定。';
      
      if (isJailTriggered) {
        finalType = TYPE_LIBRARY.JAIL;
        modeKicker = '严重警告';
        badge = '危险评级：极高';
        sub = '你的XP系统过于危险，即将实施抓捕！';
      } else {
        finalType = bestNormal;
      }
      return { rawScores, levels, finalType, modeKicker, badge, sub, isJailTriggered };
    }

    function renderResult() {
      const result = computeResult();
      const type = result.finalType;

      document.getElementById('resultModeKicker').textContent = result.modeKicker;
      document.getElementById('resultTypeName').textContent = `${type.code}（${type.cn}）`;
      document.getElementById('matchBadge').textContent = result.badge;
      document.getElementById('resultTypeSub').textContent = result.sub;
      document.getElementById('resultDesc').textContent = type.desc;
      document.getElementById('posterCaption').textContent = type.intro;
      document.getElementById('posterEmoji').textContent = type.emoji;

      const dimList = document.getElementById('dimList');
      if (result.isJailTriggered) {
         dimList.innerHTML = `<div class="dim-item"><p style="color:var(--accent-strong); font-weight:bold; text-align:center;">雷达图因涉嫌违规已被查封！</p></div>`;
      } else {
        dimList.innerHTML = dimensionOrder.map(dim => {
          const level = result.levels[dim];
          return `
            <div class="dim-item">
              <div class="dim-item-top">
                <div class="dim-item-name">${dimensionMeta[dim].name}</div>
                <div class="dim-item-score">${level} 型雷达</div>
              </div>
              <p>${DIM_EXPLANATIONS[dim][level]}</p>
            </div>
          `;
        }).join('');
      }
      
      showScreen('result');
    }

    function startTest() {
      app.answers = {};
      const shuffledRegular = shuffle(questions);
      // 随机插入 FBI 审查题
      const insertIndex = Math.floor(Math.random() * 30) + 5; 
      app.shuffledQuestions = [
        ...shuffledRegular.slice(0, insertIndex),
        specialQuestions[0],
        ...shuffledRegular.slice(insertIndex)
      ];
      renderQuestions();
      showScreen('test');
    }

    document.getElementById('startBtn').addEventListener('click', startTest);
    document.getElementById('backIntroBtn').addEventListener('click', () => showScreen('intro'));
    document.getElementById('submitBtn').addEventListener('click', renderResult);
    document.getElementById('restartBtn').addEventListener('click', startTest);
    document.getElementById('toTopBtn').addEventListener('click', () => showScreen('intro'));
  </script>
</body>
</html>
