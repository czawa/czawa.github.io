<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反常理人类验证系统</title>
    <style>
        :root {
            --primary: #ff4757;
            --success: #2ed573;
            --bg-color: #2f3542;
        }
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 背景动画元素 */
        .bg-shapes {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .shape {
            position: absolute; border-radius: 50%;
            background: linear-gradient(45deg, #1e90ff, #ff4757);
            animation: float 10s infinite alternate ease-in-out;
        }
        .shape:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 20%; animation-delay: 0s; }
        .shape:nth-child(2) { width: 300px; height: 300px; bottom: 20%; right: 10%; animation-delay: -3s; }
        .shape:nth-child(3) { width: 150px; height: 150px; top: 40%; left: 60%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(100px, 50px) rotate(180deg); }
        }

        /* 隐藏彩蛋文字 */
        .easter-egg-text {
            position: absolute; z-index: 2; font-size: 3rem; font-weight: bold;
            color: white; text-shadow: 0 0 20px #ff4757; opacity: 0; transition: opacity 1s;
            pointer-events: none;
        }

        /* 高斯模糊遮罩 */
        .blur-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            z-index: 3; transition: backdrop-filter 1.5s ease;
        }

        /* 验证卡片主体 */
        .card {
            position: relative; z-index: 4;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 40px; width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center; color: white;
            backdrop-filter: blur(10px); transition: transform 0.3s;
        }

        .title { cursor: pointer; user-select: none; margin-bottom: 30px; }

        /* 调皮的滑块 */
        .slider-container { margin-bottom: 30px; text-align: left; }
        .slider-container label { font-size: 0.9rem; margin-bottom: 10px; display: block; }
        input[type=range] {
            width: 100%; -webkit-appearance: none; background: transparent; cursor: pointer;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: white; margin-top: -5px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
        }

        /* 麦克风大喊区域 */
        .mic-container { margin-bottom: 30px; text-align: left; }
        .mic-bar-bg { width: 100%; height: 15px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .mic-bar-fill { height: 100%; width: 0%; background: var(--success); transition: width 0.1s; }
        #mic-btn { background: #3742fa; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }

        /* 逃跑的按钮 */
        #submit-btn {
            background: var(--primary); color: white; border: none;
            padding: 15px 30px; border-radius: 25px; font-size: 1rem; font-weight: bold;
            cursor: pointer; position: relative; transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        /* 通关提示 */
        .success-msg { display: none; color: var(--success); font-size: 1.5rem; font-weight: bold; }
        
        /* 抖动动画 */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.5s; }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="easter-egg-text" id="easter-egg-text">🎉 恭喜你打破了次元壁！</div>

    <div class="blur-overlay" id="blur-overlay"></div>

    <div class="card" id="main-card">
        <h2 class="title" id="title">高难度人类验证</h2>
        <div id="game-area">
            
            <div class="slider-container">
                <label id="slider-label">1. 请将滑块拖到底 (注意防滑)</label>
                <input type="range" id="slider" min="0" max="100" value="0">
            </div>

            <div class="mic-container">
                <label>2. 对着麦克风大喊一声证明是活人</label><br>
                <button id="mic-btn">开启麦克风权限</button>
                <span id="mic-status" style="font-size: 0.8rem; margin-left: 10px;">未就绪</span>
                <div class="mic-bar-bg">
                    <div class="mic-bar-fill" id="mic-fill"></div>
                </div>
            </div>

            <button id="submit-btn">确认我是人类</button>
        </div>

        <div class="success-msg" id="success-msg">
            ✅ 验证通过！<br><span style="font-size: 1rem; color: white;">你真是一个极具耐心的人类！</span>
        </div>
    </div>

    <script>
        // --- 彩蛋逻辑：连续点击标题 ---
        let clickCount = 0;
        const title = document.getElementById('title');
        const blurOverlay = document.getElementById('blur-overlay');
        const easterEggText = document.getElementById('easter-egg-text');

        title.addEventListener('click', () => {
            clickCount++;
            if (clickCount === 5) {
                blurOverlay.style.backdropFilter = 'blur(0px)';
                blurOverlay.style.webkitBackdropFilter = 'blur(0px)';
                easterEggText.style.opacity = '1';
                document.getElementById('main-card').classList.add('shake');
                title.innerText = "次元壁已被破坏！";
            }
        });

        // --- 调皮的滑块逻辑 ---
        const slider = document.getElementById('slider');
        let sliderPassed = false;
        
        // 当用户松开鼠标/手指时检查
        slider.addEventListener('mouseup', checkSlider);
        slider.addEventListener('touchend', checkSlider);

        function checkSlider() {
            if (slider.value < 100) {
                // 如果没拖到底，弹回 0
                slider.style.transition = 'all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55)'; // 弹簧效果
                slider.value = 0;
                setTimeout(() => { slider.style.transition = ''; }, 400); // 恢复正常拖动
                sliderPassed = false;
            } else {
                sliderPassed = true;
                document.getElementById('slider-label').innerText = "1. 滑块验证完成 ✅";
            }
        }

        // --- 麦克风大喊逻辑 ---
        const micBtn = document.getElementById('mic-btn');
        const micFill = document.getElementById('mic-fill');
        const micStatus = document.getElementById('mic-status');
        let micPassed = false;
        let audioContext;

        micBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(256, 1, 1);

                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                micBtn.style.display = 'none';
                micStatus.innerText = "🎤 正在监听，请大喊！";

                javascriptNode.onaudioprocess = function() {
                    if(micPassed) return; // 如果已经通过则不再处理
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) { values += array[i]; }
                    let average = values / array.length;
                    
                    // 将音量映射到进度条 (average 一般在 0-100 之间)
                    let percent = Math.min(average * 1.5, 100);
                    micFill.style.width = percent + '%';

                    // 阈值设定：音量超过 70 算作大喊
                    if (average > 70) {
                        micPassed = true;
                        micFill.style.background = '#2ed573';
                        micFill.style.width = '100%';
                        micStatus.innerText = '✅ 肺活量不错，验证完成！';
                        // 停止监听
                        stream.getTracks().forEach(track => track.stop());
                        javascriptNode.disconnect();
                    }
                }
            } catch (err) {
                console.error("麦克风启动失败", err);
                micStatus.innerText = "❌ 麦克风无法使用，算你走运，直接通过！";
                micPassed = true;
                micFill.style.width = '100%';
            }
        });

        // --- 逃跑的按钮逻辑 ---
        const submitBtn = document.getElementById('submit-btn');
        let escapes = 0;
        const maxEscapes = 3;

        submitBtn.addEventListener('mouseover', () => {
            if (escapes < maxEscapes) {
                // 随机生成偏移量 (-120 到 120 像素)
                const x = Math.random() * 240 - 120;
                const y = Math.random() * 100 - 50;
                submitBtn.style.transform = `translate(${x}px, ${y}px)`;
                escapes++;
            } else if (escapes === maxEscapes) {
                // 逃跑 3 次后“累了”，停止逃跑并变灰暗一点
                submitBtn.style.transform = `translate(0px, 0px)`;
                submitBtn.innerText = "呼...呼...我跑不动了，点吧";
                submitBtn.style.background = "#ff7f50";
                escapes++;
            }
        });

        // --- 最终提交逻辑 ---
        submitBtn.addEventListener('click', () => {
            if (!sliderPassed) {
                alert("不要偷懒！先把滑块拖到底！");
                document.getElementById('main-card').classList.add('shake');
                setTimeout(() => document.getElementById('main-card').classList.remove('shake'), 500);
                return;
            }
            if (!micPassed) {
                alert("没吃饭吗？大声点！开启麦克风喊一声！");
                document.getElementById('main-card').classList.add('shake');
                setTimeout(() => document.getElementById('main-card').classList.remove('shake'), 500);
                return;
            }

            // 全部通过
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            document.getElementById('main-card').style.transform = 'scale(1.1)';
            document.getElementById('title').innerText = "人类，你赢了。";
        });
    </script>
</body>
</html>
